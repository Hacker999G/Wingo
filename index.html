<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wingo Premium Predictor</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050810; color: #e2e8f0; font-family: sans-serif; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(15px); border: 1px solid rgba(59, 130, 246, 0.2); border-radius: 25px; }
        .premium-btn { background: linear-gradient(90deg, #1e40af, #3b82f6); box-shadow: 0 5px 15px rgba(59, 130, 246, 0.3); }
        .hidden { display: none !important; }
        #user-photo { border: 2px solid #3b82f6; }
    </style>
</head>
<body class="p-4 flex flex-col items-center min-h-screen">

    <div id="loading-screen" class="fixed inset-0 bg-[#050810] z-50 flex items-center justify-center flex-col">
        <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="text-blue-400 text-xs tracking-widest uppercase">Fetching Telegram Data...</p>
    </div>

    <div class="w-full max-w-md flex items-center justify-between mb-6 glass p-4">
        <div class="flex items-center gap-3">
            <img id="user-photo" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" class="w-12 h-12 rounded-full object-cover">
            <div>
                <p id="user-name" class="text-sm font-bold text-white">Loading...</p>
                <p id="user-status" class="text-[10px] font-bold text-red-500 uppercase">Inactive</p>
            </div>
        </div>
        <div onclick="openAdmin()" class="text-[10px] bg-slate-900 px-3 py-1 rounded border border-gray-800 cursor-pointer">
            ID: <span id="user-id">0000</span>
        </div>
    </div>

    <div id="lock-screen" class="hidden glass p-8 w-full max-w-md text-center">
        <h2 class="text-xl font-black mb-2 uppercase italic text-blue-400 tracking-tighter">Premium Access Locked</h2>
        <p class="text-xs text-gray-400 mb-6">আপনার ৭ দিনের সাবস্ক্রিপশন ফি ১০০ টাকা জমা দিন।</p>
        
        <div class="bg-black/50 p-6 rounded-2xl mb-6 border border-gray-800">
            <p class="text-3xl font-black text-white italic">৳১০০</p>
            <p class="text-[10px] text-gray-500 mt-1 uppercase">Validity: 7 Days</p>
        </div>

        <button onclick="payNow()" class="w-full py-4 rounded-xl font-bold premium-btn text-white active:scale-95 transition-all mb-4">
            Pay Now via bKash/Nagad
        </button>
        <button onclick="checkAgain()" class="text-xs text-blue-400 underline">Refresh Status</button>
    </div>

    <div id="app-screen" class="hidden w-full max-w-md space-y-4">
        <div class="glass p-6">
            <select id="platform" class="w-full bg-slate-950 border border-gray-800 p-4 rounded-xl mb-6 text-white outline-none">
                <option value="Dk win">Dk win</option>
                <option value="amar club">amar club</option>
                <option value="HAGZNIC">HAGZNIC</option>
            </select>

            <div class="grid grid-cols-2 gap-3 mb-6 font-mono">
                <div class="bg-black/60 p-4 rounded-xl text-center border border-gray-900">
                    <p class="text-[9px] text-gray-500 uppercase mb-1">Period</p>
                    <p id="period" class="text-blue-400 text-lg font-bold">---</p>
                </div>
                <div class="bg-black/60 p-4 rounded-xl text-center border border-gray-900">
                    <p class="text-[9px] text-gray-500 uppercase mb-1">Timer</p>
                    <p id="timer" class="text-red-500 text-lg font-bold">00:30</p>
                </div>
            </div>

            <div id="res-box" class="hidden py-12 rounded-3xl bg-slate-950 border border-blue-500/20 mb-6 text-center shadow-2xl">
                <p class="text-[10px] text-gray-600 uppercase mb-2">Signal Result</p>
                <h1 id="res-text" class="text-6xl font-black italic tracking-widest">---</h1>
            </div>

            <button onclick="getSignal()" id="gen-btn" class="w-full py-5 rounded-xl font-black premium-btn uppercase tracking-widest text-sm active:scale-95 transition-all">
                Get 30s Prediction
            </button>
        </div>
    </div>

    <div id="admin-panel" class="hidden fixed inset-0 bg-black/95 z-[100] p-10 flex flex-col items-center">
        <h2 class="text-xl font-bold mb-6">Admin Panel</h2>
        <input id="target-id" type="text" placeholder="User ID" class="w-full max-w-xs p-4 rounded bg-slate-800 border-none mb-4">
        <button onclick="activateUser()" class="bg-green-600 px-10 py-4 rounded-full font-bold">Activate 7 Days</button>
        <button onclick="closeAdmin()" class="mt-10 text-gray-500 underline">Close</button>
    </div>

    <script>
        // --- Firebase Init ---
        const firebaseConfig = {
            apiKey: "AIzaSyCktzbHCPM1upP5xJppjM_Jg5ZcFBGFAdo",
            authDomain: "ff-esport-bd-9dbc0.firebaseapp.com",
            projectId: "ff-esport-bd-9dbc0",
            storageBucket: "ff-esport-bd-9dbc0.firebasestorage.app",
            messagingSenderId: "31048615788",
            appId: "1:31048615788:web:2806b7b5c68181d9de5549",
            measurementId: "G-3NWYCF7WW9"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // --- Telegram Data Collection ---
        const tg = window.Telegram.WebApp;
        tg.expand();
        const userData = tg.initDataUnsafe?.user || { first_name: "Developer", id: 6849201, photo_url: "" };

        document.getElementById('user-name').innerText = userData.first_name + " " + (userData.last_name || "");
        document.getElementById('user-id').innerText = userData.id;
        if(userData.photo_url) document.getElementById('user-photo').src = userData.photo_url;

        // --- Auth Logic ---
        async function checkAccess() {
            const doc = await db.collection('users').doc(userData.id.toString()).get();
            const now = new Date().getTime();

            if (doc.exists && doc.data().expiryDate > now) {
                document.getElementById('app-screen').classList.remove('hidden');
                document.getElementById('user-status').innerText = "Premium: Active";
                document.getElementById('user-status').className = "text-[10px] font-bold text-green-400 uppercase";
            } else {
                document.getElementById('lock-screen').classList.remove('hidden');
                // Auto create inactive user in DB
                if(!doc.exists) {
                    await db.collection('users').doc(userData.id.toString()).set({
                        name: userData.first_name,
                        id: userData.id,
                        expiryDate: 0
                    });
                }
            }
            document.getElementById('loading-screen').classList.add('hidden');
        }

        function payNow() {
            const payUrl = `https://payflow-git.vercel.app/?pay=9zaIHrtpb3iiAGKsRZjg&amount=100&cus_id=${userData.id}`;
            tg.openLink(payUrl);
        }

        function checkAgain() { location.reload(); }

        // --- Predictor Logic ---
        function startTimer() {
            setInterval(() => {
                const now = new Date();
                const sec = now.getSeconds();
                const remain = 30 - (sec % 30);
                document.getElementById('timer').innerText = `00:${remain < 10 ? '0' : ''}${remain}`;
                const pNum = Math.floor((now.getHours() * 120) + (now.getMinutes() * 2) + (sec >= 30 ? 2 : 1));
                document.getElementById('period').innerText = "..." + pNum;
                if (remain === 30) {
                    document.getElementById('res-box').classList.add('hidden');
                    document.getElementById('gen-btn').disabled = false;
                }
            }, 1000);
        }

        function getSignal() {
            const btn = document.getElementById('gen-btn');
            btn.innerText = "Analyzing...";
            btn.disabled = true;
            setTimeout(() => {
                const res = Math.random() > 0.5 ? "BIG" : "SMALL";
                document.getElementById('res-box').classList.remove('hidden');
                const txt = document.getElementById('res-text');
                txt.innerText = res;
                txt.className = `text-6xl font-black italic tracking-widest ${res === 'BIG' ? 'text-blue-500' : 'text-red-600'}`;
                btn.innerText = "Signal Received";
            }, 1000);
        }

        // --- Admin Functions ---
        function openAdmin() {
            // শুধুমাত্র আপনি (Developer) আপনার আইডি দিয়ে এটি খুলতে পারবেন
            // এখানে আপনার নিজের টেলিগ্রাম আইডি দিন (উদাহরণ: 6849201)
            const myId = 6849201; 
            if(userData.id == myId) {
                document.getElementById('admin-panel').classList.remove('hidden');
            }
        }
        function closeAdmin() { document.getElementById('admin-panel').classList.add('hidden'); }

        async function activateUser() {
            const targetId = document.getElementById('target-id').value;
            if(!targetId) return alert("Enter ID");
            const expiry = new Date().getTime() + (7 * 24 * 60 * 60 * 1000); // 7 Days
            await db.collection('users').doc(targetId).set({ expiryDate: expiry }, { merge: true });
            alert("User Activated for 7 Days!");
            location.reload();
        }

        startTimer();
        checkAccess();
    </script>
</body>
</html>
