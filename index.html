<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wingo Elite Hack Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        body { background: #050810; color: white; font-family: sans-serif; user-select: none; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border-radius: 25px; border: 1px solid rgba(255, 255, 255, 0.08); }
        .gradient-text { background: linear-gradient(to right, #00f2ff, #7000ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .pay-btn { background: linear-gradient(135deg, #00f2ff, #7000ff); }
        .hidden-section { display: none; }
    </style>
</head>
<body class="overflow-hidden">

    <header class="p-6 flex justify-between items-center animate__animated animate__fadeInDown">
        <div class="flex items-center gap-3">
            <div class="w-12 h-12 rounded-2xl border-2 border-cyan-500/30 flex items-center justify-center bg-cyan-500/10 text-xl text-cyan-400">💎</div>
            <div>
                <h2 id="u_name" class="font-bold text-sm">Loading...</h2>
                <p id="u_status" class="text-[9px] font-black tracking-widest text-red-500 uppercase">Status: Checking...</p>
            </div>
        </div>
        <div class="glass px-4 py-2 text-[10px] font-bold text-cyan-400 border-cyan-500/20 uppercase">Network: Live</div>
    </header>

    <main class="h-[calc(100vh-160px)] overflow-y-auto px-6">
        <section id="sec-plan" class="animate__animated animate__fadeIn">
            <h1 class="text-3xl font-black mb-6 italic uppercase">Choose <span class="gradient-text">Plan</span></h1>
            <div class="grid gap-4" id="plan-list"></div>
        </section>

        <section id="sec-predict" class="hidden-section relative min-h-[400px]">
            <div id="lock-screen" class="absolute inset-0 z-50 glass flex flex-col items-center justify-center text-center p-8">
                <div class="text-6xl mb-6">🔒</div>
                <h2 class="text-xl font-bold mb-2">Access Locked</h2>
                <p class="text-gray-500 text-sm mb-8">প্ল্যান কিনলে এটি অটোমেটিক আনলক হবে।</p>
                <button onclick="showSection('plan')" class="px-10 py-3 bg-white text-black rounded-full font-bold uppercase text-xs">Buy Plan</button>
            </div>
            <div id="predict-ui" class="opacity-20 pointer-events-none blur-md transition-all duration-700">
                <h1 class="text-2xl font-black mb-6 gradient-text uppercase">Predictor Pro</h1>
                <div class="glass p-8 text-center border-white/10">
                    <input type="number" id="period_input" placeholder="000" class="w-full bg-black/40 border border-white/10 p-6 rounded-3xl mb-8 text-center text-5xl font-black text-cyan-400 focus:border-cyan-500/50 outline-none">
                    <button onclick="getSignal()" id="sig_btn" class="pay-btn w-full py-5 rounded-3xl font-black text-lg uppercase shadow-lg shadow-cyan-500/20">Analyze</button>
                </div>
                <div id="res_div" class="mt-10 text-center hidden animate__animated animate__zoomIn">
                    <h2 id="final_result" class="text-8xl font-black tracking-tighter italic">BIG</h2>
                </div>
            </div>
        </section>

        <section id="sec-profile" class="hidden-section animate__animated animate__fadeIn">
            <div class="glass p-10 text-center mt-4 border-white/5">
                <div class="w-24 h-24 bg-gradient-to-tr from-cyan-500 to-purple-600 mx-auto rounded-[35px] flex items-center justify-center text-4xl mb-6 shadow-2xl">👤</div>
                <h2 id="p_name" class="text-2xl font-black uppercase">User</h2>
                <p id="p_id" class="text-gray-500 font-mono text-xs mt-1">ID: 00000000</p>
                <button onclick="window.open('https://t.me/Ruddro_nill')" class="w-full py-4 glass text-xs font-black uppercase tracking-widest border-cyan-500/20 text-cyan-400 mt-10">Contact Support</button>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-6 left-6 right-6 h-20 glass flex items-center justify-around z-[100] border-white/10">
        <button onclick="showSection('plan')" id="n-plan" class="flex flex-col items-center gap-1 text-[10px] font-black"><span>💳</span>PLAN</button>
        <button onclick="showSection('predict')" id="n-predict" class="flex flex-col items-center gap-1 text-[10px] font-black"><span>🎯</span>SIGNAL</button>
        <button onclick="showSection('profile')" id="n-profile" class="flex flex-col items-center gap-1 text-[10px] font-black"><span>👤</span>USER</button>
    </nav>

    <script>
        const CONFIG = {
            db: "https://ff-esport-bd-9dbc0-default-rtdb.firebaseio.com",
            admin: "6045231271",
            // আপনার PayFlow গেটওয়ে ইউজারনেম এখানে দিন (যেমন: WingoHack)
            gatewayUsername: "WingoHack" 
        };

        let tg = window.Telegram.WebApp;
        tg.expand();
        const user = tg.initDataUnsafe.user || { first_name: "TestUser", id: "12345678" };

        document.getElementById('u_name').innerText = user.first_name;
        document.getElementById('p_name').innerText = user.first_name;
        document.getElementById('p_id').innerText = "ID: " + user.id;

        const plans = [ 
            {n:'3 Days', p:300}, 
            {n:'7 Days', p:650}, 
            {n:'15 Days', p:1400}, 
            {n:'30 Days', p:2500} 
        ];

        // প্ল্যান লিস্ট রেন্ডার করা
        plans.forEach(plan => {
            document.getElementById('plan-list').innerHTML += `
                <div onclick="initiatePayment('${plan.n}', ${plan.p})" class="glass p-6 flex justify-between items-center active:scale-95 transition-all cursor-pointer">
                    <div>
                        <h3 class="font-black text-lg">${plan.n} Access</h3>
                        <p class="text-[10px] text-cyan-400 uppercase font-bold tracking-widest">VIP Server</p>
                    </div>
                    <div class="text-2xl font-black italic">৳${plan.p}</div>
                </div>`;
        });

        // পেমেন্ট গেটওয়েতে পাঠানো
        function initiatePayment(planName, price) {
            // গেটওয়ে ইউআরএল তৈরি
            const paymentUrl = `https://payflow-git.vercel.app/pay/${CONFIG.gatewayUsername}?amount=${price}&cus_id=${user.id}&opt_a=${encodeURIComponent(planName)}`;
            
            // সরাসরি গেটওয়েতে নিয়ে যাবে
            window.location.href = paymentUrl;
        }

        // ইউজার স্ট্যাটাস চেক করা (অটোমেটিক আপডেট হবে ডাটাবেস থেকে)
        function checkStatus() {
            if(String(user.id) === CONFIG.admin) {
                unlockUI("OWNER / LIFETIME");
                return;
            }

            fetch(`${CONFIG.db}/users/${user.id}.json`)
            .then(r => r.json())
            .then(data => {
                if(data && data.isPaid) {
                    unlockUI(data.plan);
                } else {
                    document.getElementById('u_status').innerText = "Status: Unpaid";
                }
            });
        }

        function unlockUI(plan) {
            document.getElementById('lock-screen').style.display = 'none';
            document.getElementById('predict-ui').classList.remove('opacity-20', 'pointer-events-none', 'blur-md');
            document.getElementById('u_status').innerText = "Status: Premium Active (" + plan + ")";
            document.getElementById('u_status').className = "text-[9px] font-black tracking-widest text-green-500 uppercase";
        }

        function showSection(id) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden-section'));
            document.getElementById('sec-' + id).classList.remove('hidden-section');
            document.querySelectorAll('nav button').forEach(b => b.style.opacity = "0.3");
            document.getElementById('n-' + id).style.opacity = "1";
        }

        function getSignal() {
            const p = document.getElementById('period_input').value;
            if(!p) return tg.showAlert("Period Number দিন!");
            const btn = document.getElementById('sig_btn');
            btn.innerText = "Analyzing...";
            setTimeout(() => {
                const res = Math.random() > 0.5 ? "BIG" : "SMALL";
                document.getElementById('res_div').classList.remove('hidden');
                document.getElementById('final_result').innerText = res;
                document.getElementById('final_result').className = res === "BIG" ? "text-8xl font-black text-orange-500 animate__animated animate__pulse" : "text-8xl font-black text-blue-500 animate__animated animate__pulse";
                btn.innerText = "Analyze";
                document.getElementById('period_input').value = parseInt(p) + 1;
            }, 1000);
        }

        // Initial Load
        showSection('plan');
        checkStatus();
        setInterval(checkStatus, 7000); // ৭ সেকেন্ড পর পর অটো চেক হবে
    </script>
</body>
</html>
