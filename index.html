<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DK WIN AI PREMIUM v6 - 2026</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Montserrat', sans-serif; }
        iframe { position: absolute; width: 100%; height: 100%; border: none; z-index: 1; }

        #vipBox {
            position: absolute;
            z-index: 10000;
            width: 140px; 
            background: rgba(15, 15, 15, 0.9);
            border: 1px solid #ffcc00;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.9);
            text-align: center;
            padding: 8px 6px; 
            cursor: move;
            touch-action: none;
            backdrop-filter: blur(8px);
        }

        .title { font-size: 10px; font-weight: 900; color: #ffcc00; text-transform: uppercase; margin-bottom: 5px; }
        .period-box { font-size: 9px; color: #fff; margin-bottom: 4px; background: rgba(255,255,255,0.05); padding: 3px; border-radius: 5px; }
        .timer-row { display: flex; justify-content: center; align-items: center; margin: 5px 0; gap: 5px; }
        .timer-circle { font-size: 16px; font-weight: bold; color: #00ff88; }
        .signal-card { background: rgba(255, 255, 255, 0.03); border-radius: 8px; padding: 6px; border: 1px solid rgba(255, 255, 255, 0.08); }
        .signal-display { font-size: 28px; font-weight: 900; margin: 2px 0; }
        .probability-text { font-size: 9px; font-weight: bold; color: #00ff88; }
        #loginUI input { width: 100%; padding: 6px; margin: 6px 0; background: #111; border: 1px solid #ffcc00; color: #fff; border-radius: 6px; font-size: 11px; text-align: center; }
        #loginUI button { width: 100%; padding: 6px; background: #ffcc00; border: none; border-radius: 6px; font-weight: bold; font-size: 11px; }
    </style>
</head>
<body>

    <iframe src="https://hgnice.xyz/#/register?invitationCode=86331230624"></iframe>

    <div id="vipBox" style="top: 10px; left: 10px;">
        <div id="loginUI">
            <div class="title">DK WIN AI LOGIN</div>
            <input type="password" id="pass" placeholder="Password">
            <button onclick="auth()">START AI</button>
        </div>

        <div id="mainUI" style="display: none;">
            <div class="title">DK WIN PREMIUM</div>
            <div class="period-box" id="periodDisplay">P: LOADING...</div>
            <div class="timer-row"><div class="timer-circle"><span id="secDisplay">--</span>s</div></div>
            <div class="signal-card">
                <div class="signal-display" id="signalResult">WAIT</div>
                <div class="probability-text" id="probability">WIN RATE: --%</div>
            </div>
        </div>
    </div>

    <script>
        // Draggable script
        const box = document.getElementById("vipBox");
        let xOffset = 0, yOffset = 0, isDragging = false;
        box.ontouchstart = (e) => { isDragging = true; initialX = e.touches[0].clientX - xOffset; initialY = e.touches[0].clientY - yOffset; };
        box.ontouchmove = (e) => { if(isDragging) { xOffset = e.touches[0].clientX - initialX; yOffset = e.touches[0].clientY - initialY; box.style.transform = `translate3d(${xOffset}px, ${yOffset}px, 0)`; } };
        box.ontouchend = () => isDragging = false;

        function auth() {
            if(document.getElementById('pass').value === "123456") {
                document.getElementById('loginUI').style.display = 'none';
                document.getElementById('mainUI').style.display = 'block';
                runEngine();
            }
        }

        function runEngine() {
            setInterval(() => {
                const now = new Date();
                const seconds = now.getSeconds();
                
                // গেম টাইমারের সাথে সিঙ্ক (৩০ সেকেন্ডের স্লট)
                const remaining = 30 - (seconds % 30);
                
                // ১০:১৪ PM এবং পিরিয়ড ৫১৯৪৯ অনুযায়ী বেস অ্যাডজাস্টমেন্ট
                const total30sIntervals = (now.getHours() * 120) + (now.getMinutes() * 2) + Math.floor(seconds / 30);
                const dateStr = now.toISOString().slice(0, 10).replace(/-/g, '');
                
                // আপনার অনুরোধ অনুযায়ী ২ পিরিয়ড এগিয়ে রাখা হয়েছে (৪৯২৮১ + ২ = ৪৯২৮৩)
                const futurePeriod = 49283 + total30sIntervals;
                const periodFull = dateStr + "1000" + futurePeriod;

                document.getElementById('periodDisplay').innerText = "NEXT P: " + periodFull;
                document.getElementById('secDisplay').innerText = remaining;

                // নতুন পিরিয়ড শুরু হওয়ার ঠিক আগে বা শুরুতে সিগনাল পরিবর্তন
                if (remaining === 30 || remaining === 29) {
                    updateSignal(futurePeriod);
                }
            }, 1000);
        }

        function updateSignal(seed) {
            const sigBox = document.getElementById('signalResult');
            const probText = document.getElementById('probability');

            // সিগনাল লজিক যা পিরিয়ড নাম্বারের উপর ভিত্তি করে কাজ করবে
            const prediction = (seed % 3 === 0 || seed % 7 === 0) ? "BIG" : "SMALL";
            const accuracy = 93 + (seed % 6); 

            sigBox.innerText = prediction;
            sigBox.style.color = (prediction === "BIG") ? "#ffcc00" : "#ff3333";
            probText.innerText = "WIN RATE: " + accuracy + "%";
        }
    </script>
</body>
</html>
