<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wingo Elite Hack</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        :root { --primary: #00f2ff; --bg: #050810; }
        body { background: var(--bg); color: #e2e8f0; font-family: 'Inter', sans-serif; user-select: none; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; }
        .active-nav { color: var(--primary); filter: drop-shadow(0 0 8px var(--primary)); }
        .premium-btn { background: linear-gradient(135deg, #00f2ff, #7000ff); transition: 0.2s; cursor: pointer; }
        .hidden-section { display: none; }
    </style>
</head>
<body class="overflow-hidden">

    <header class="p-5 flex justify-between items-center animate__animated animate__fadeInDown">
        <div class="flex items-center gap-3">
            <img id="u_img" src="https://via.placeholder.com/50" class="w-12 h-12 rounded-2xl border border-cyan-500/50 object-cover">
            <div>
                <h2 id="u_name" class="font-bold text-sm">Loading...</h2>
                <p class="text-[10px] text-cyan-400 font-mono">STATUS: <span id="status_text">CHECKING...</span></p>
            </div>
        </div>
        <div class="glass px-3 py-1 text-[10px] font-bold text-cyan-300">SERVER: ONLINE</div>
    </header>

    <main class="h-[calc(100vh-160px)] overflow-y-auto px-5">
        <section id="sec-plan" class="animate__animated animate__fadeIn">
            <h1 class="text-2xl font-black mb-6 uppercase tracking-tighter">Premium <span class="text-cyan-400">Plans</span></h1>
            <div class="space-y-4" id="plan-container"></div>
        </section>

        <section id="sec-predict" class="hidden-section relative min-h-[400px]">
            <div id="lock-overlay" class="absolute inset-0 z-50 flex flex-col items-center justify-center text-center p-6 rounded-3xl bg-black/90 backdrop-blur-xl">
                <div class="text-5xl mb-4">🔒</div>
                <h3 class="text-xl font-bold">Locked Content</h3>
                <p class="text-sm text-gray-500 mt-2">অ্যাডমিন পেমেন্ট ভেরিফাই করলে এটি আনলক হবে।</p>
                <button onclick="showSection('plan')" class="mt-6 px-8 py-3 bg-cyan-500 text-black rounded-full font-black text-xs uppercase">View Plans</button>
            </div>
            <div id="predict-content" class="blur-md pointer-events-none opacity-40">
                <h1 class="text-2xl font-black mb-6 text-cyan-400 uppercase">Predictor</h1>
                <div class="glass p-6">
                    <input type="number" id="p_num" placeholder="Period Number" class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl mb-8 text-center text-4xl font-black text-cyan-400 outline-none">
                    <button onclick="generate()" id="g_btn" class="premium-btn w-full py-5 rounded-2xl font-black text-lg">ANALYZE</button>
                </div>
                <div id="res_box" class="hidden mt-8 text-center animate__animated animate__zoomIn">
                    <h2 id="final_res" class="text-8xl font-black my-4">BIG</h2>
                </div>
            </div>
        </section>

        <section id="sec-profile" class="hidden-section animate__animated animate__fadeIn">
            <div class="glass p-8 text-center mt-5">
                <img id="p_img" src="https://via.placeholder.com/100" class="w-24 h-24 mx-auto rounded-3xl border-2 border-cyan-500/30 p-1 mb-4 object-cover">
                <h2 id="p_name" class="text-2xl font-bold">User</h2>
                <p id="p_id" class="text-gray-500 font-mono text-xs mt-1">ID: 000000</p>
                <div class="mt-8 grid grid-cols-2 gap-3">
                    <div class="bg-white/5 p-4 rounded-2xl"><span class="block text-[10px] text-gray-500">ACCESS</span><span class="text-sm font-bold text-red-500" id="exp">LOCKED</span></div>
                    <div class="bg-white/5 p-4 rounded-2xl"><span class="block text-[10px] text-gray-500">TYPE</span><span class="text-sm font-bold text-cyan-400">PREMIUM</span></div>
                </div>
                <button onclick="window.open('https://t.me/Ruddro_nill')" class="w-full mt-6 py-4 glass text-xs font-bold uppercase">Contact Admin</button>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-6 left-5 right-5 h-20 glass flex items-center justify-around z-[100]">
        <button onclick="showSection('plan')" id="n-plan" class="active-nav flex flex-col items-center text-[10px] font-bold"><span>💳</span>PLAN</button>
        <button onclick="showSection('predict')" id="n-predict" class="flex flex-col items-center text-[10px] font-bold"><span>🎯</span>SIGNAL</button>
        <button onclick="showSection('profile')" id="n-profile" class="flex flex-col items-center text-[10px] font-bold"><span>👤</span>USER</button>
    </nav>

    <div id="pay-modal" class="fixed inset-0 z-[200] hidden bg-black/90 flex items-end">
        <div class="w-full bg-[#e11d48] rounded-t-[40px] p-8 animate__animated animate__slideInUp">
            <h2 class="text-2xl font-black text-white text-center mb-6 uppercase italic">Nagad Payment</h2>
            <div class="bg-white rounded-3xl p-6 text-black mb-6">
                <div class="flex justify-between items-center border-b pb-4 mb-4">
                    <div><p class="text-[10px] text-gray-400">PERSONAL NUMBER</p><p id="n_num" class="text-xl font-black">01983256576</p></div>
                    <button onclick="copyNum()" class="bg-rose-600 text-white px-4 py-2 rounded-xl text-xs font-bold">COPY</button>
                </div>
                <div class="flex justify-between">
                    <div><p class="text-[10px] text-gray-400">PAYABLE AMOUNT</p><p id="amt-text" class="text-2xl font-black text-rose-600">৳0</p></div>
                </div>
            </div>
            <input type="text" id="trx" placeholder="Enter TrxID" class="w-full p-5 rounded-2xl bg-black/20 border border-white/10 text-white font-bold outline-none mb-4">
            <button onclick="sendReq()" class="w-full py-5 bg-white text-rose-600 rounded-2xl font-black uppercase shadow-xl">Confirm Deposit</button>
            <button onclick="closePay()" class="w-full mt-4 text-white/50 text-xs font-bold uppercase">Cancel</button>
        </div>
    </div>

    <script>
        const dbURL = "https://ff-esport-bd-9dbc0-default-rtdb.firebaseio.com";
        const botToken = "7968384087:AAEpp_OvCgQRvKAe_wq9pnxozHY9UHq36GI";
        const adminChatId = "7071188264";
        
        let tg = window.Telegram.WebApp;
        tg.expand();
        const user = tg.initDataUnsafe.user || { first_name: "Gopal", id: "7071188264", username: "nill" };

        let isPaid = false;
        let activePlan = "";

        // UI SYNC
        document.getElementById('u_name').innerText = user.first_name;
        document.getElementById('p_name').innerText = user.first_name;
        document.getElementById('p_id').innerText = `ID: ${user.id}`;
        if(user.photo_url) { document.getElementById('u_img').src = user.photo_url; document.getElementById('p_img').src = user.photo_url; }

        // CHECK STATUS & OWNER UNLOCK
        function checkStatus() {
            // আপনার নিজের আইডি সবসময় আনলক থাকবে
            if(user.id == adminChatId) {
                unlockUI("LIFETIME OWNER");
                return;
            }

            fetch(`${dbURL}/users/${user.id}.json`).then(res => res.json()).then(data => {
                if(data && data.isPaid === true) {
                    isPaid = true;
                    unlockUI(data.plan);
                } else {
                    document.getElementById('status_text').innerText = "UNPAID";
                }
            });
        }

        function unlockUI(plan) {
            isPaid = true;
            document.getElementById('lock-overlay').style.display = 'none';
            document.getElementById('predict-content').classList.remove('blur-md', 'opacity-40', 'pointer-events-none');
            document.getElementById('status_text').innerText = "PREMIUM ACTIVE";
            document.getElementById('status_text').className = "text-green-500 font-bold";
            document.getElementById('exp').innerText = plan;
            document.getElementById('exp').className = "text-sm font-bold text-green-400";
        }

        // NAVIGATION & MODALS
        function showSection(name) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden-section'));
            document.getElementById('sec-' + name).classList.remove('hidden-section');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-nav'));
            document.getElementById('n-' + name).classList.add('active-nav');
        }

        const plans = [ {d:'3 Days', p:300}, {d:'7 Days', p:650}, {d:'15 Days', p:1400}, {d:'30 Days', p:2500} ];
        plans.forEach(p => {
            document.getElementById('plan-container').innerHTML += `<div onclick="openPay('${p.d}', ${p.p})" class="glass p-5 flex justify-between items-center"><div><h3 class="font-bold">${p.d} Access</h3></div><div class="text-right font-black text-xl">৳${p.p}</div></div>`;
        });

        function openPay(d, p) { activePlan = d; document.getElementById('amt-text').innerText = "৳"+p; document.getElementById('pay-modal').classList.remove('hidden'); }
        function closePay() { document.getElementById('pay-modal').classList.add('hidden'); }
        function copyNum() {
            navigator.clipboard.writeText("01983256576");
            tg.showScanQrPopup({text: "Number Copied! ✅"});
            setTimeout(() => tg.closeScanQrPopup(), 1000);
        }

        // TELEGRAM BOT REQUEST WITH BUTTON (KEY FIX)
        function sendReq() {
            const trx = document.getElementById('trx').value;
            if(trx.length < 5) return alert("TrxID invalid");

            const msg = `🔔 *NEW PAYMENT REQUEST*\n\n👤 User: ${user.first_name}\n🆔 UID: \`${user.id}\`\n💎 Plan: ${activePlan}\n💵 TrxID: \`${trx}\``;
            
            // বাটন সহ মেসেজ পাঠানো
            const keyboard = {
                inline_keyboard: [[
                    { text: "✅ APPROVE", callback_data: `approve_${user.id}_${activePlan}` },
                    { text: "❌ REJECT", callback_data: `reject_${user.id}` }
                ]]
            };

            fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: adminChatId,
                    text: msg,
                    parse_mode: 'Markdown',
                    reply_markup: keyboard
                })
            }).then(() => {
                tg.showAlert("আপনার রিকোয়েস্ট বটে পাঠানো হয়েছে! অ্যাডমিন অ্যাপ্রুভ করলে অটো আনলক হবে।");
                closePay();
            });
        }

        function generate() {
            if(!isPaid) return;
            const res = Math.random() > 0.5 ? "BIG" : "SMALL";
            document.getElementById('res_box').classList.remove('hidden');
            const resTxt = document.getElementById('final_res');
            resTxt.innerText = res;
            resTxt.className = res === "BIG" ? "text-8xl font-black my-4 text-orange-500" : "text-8xl font-black my-4 text-blue-500";
        }

        setInterval(checkStatus, 5000);
        checkStatus();
    </script>
</body>
</html>
