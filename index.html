<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Hack Fixed</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050810; color: white; font-family: sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .btn-pay { background: linear-gradient(to right, #00f2ff, #7000ff); }
    </style>
</head>
<body class="p-5">

    <div class="glass p-5 mb-5 flex justify-between items-center">
        <div>
            <h2 id="u_name" class="font-bold">Loading...</h2>
            <p id="status_text" class="text-[10px] text-red-500 font-bold tracking-widest">UNPAID</p>
        </div>
        <div id="owner_badge" class="hidden bg-green-500 text-[10px] px-2 py-1 rounded font-bold">OWNER</div>
    </div>

    <div id="main-content" class="relative min-h-[300px]">
        <div id="lock" class="absolute inset-0 z-50 glass flex flex-col items-center justify-center text-center p-6">
            <p class="mb-4">🔒 Please buy a plan to unlock</p>
            <button onclick="showPlans()" class="bg-white text-black px-6 py-2 rounded-full font-bold">Buy Now</button>
        </div>
        
        <div class="glass p-6 opacity-30 pointer-events-none" id="predictor">
            <h1 class="text-xl font-black mb-4 text-cyan-400">PREDICTOR</h1>
            <input type="number" id="period" placeholder="Last 3 Digits" class="w-full bg-black/40 p-4 rounded-xl mb-4 text-center text-2xl font-bold border border-white/10 outline-none">
            <button onclick="generate()" class="btn-pay w-full py-4 rounded-xl font-bold">GET SIGNAL</button>
            <h2 id="result" class="text-6xl font-black text-center mt-6 hidden">BIG</h2>
        </div>
    </div>

    <div id="plan-modal" class="fixed inset-0 bg-black/90 z-[100] p-6 hidden">
        <h2 class="text-2xl font-bold mb-6">Select Plan</h2>
        <div class="space-y-3">
            <div onclick="openPay('3 Days', 300)" class="glass p-4 flex justify-between"><span>3 Days Access</span><b>৳300</b></div>
            <div onclick="openPay('7 Days', 650)" class="glass p-4 flex justify-between"><span>7 Days Access</span><b>৳650</b></div>
            <div onclick="openPay('30 Days', 2500)" class="glass p-4 flex justify-between"><span>Monthly Access</span><b>৳2500</b></div>
        </div>
        <button onclick="document.getElementById('plan-modal').classList.add('hidden')" class="mt-8 text-gray-500 w-full">Close</button>
    </div>

    <div id="pay-modal" class="fixed inset-0 bg-rose-600 z-[200] p-8 hidden flex flex-col justify-end rounded-t-[40px]">
        <h2 class="text-2xl font-black mb-4">NAGAD SEND MONEY</h2>
        <div class="bg-white text-black p-6 rounded-3xl mb-4">
            <p class="text-xs text-gray-400">Number (Personal)</p>
            <p class="text-xl font-black mb-4">01983256576</p>
            <p class="text-xs text-gray-400">Amount</p>
            <p id="amt" class="text-2xl font-black text-rose-600">৳0</p>
        </div>
        <input type="text" id="trx" placeholder="Enter TrxID" class="w-full p-4 rounded-2xl bg-black/20 text-white font-bold mb-4 outline-none border border-white/20">
        <button onclick="sendToBot()" class="bg-white text-rose-600 py-4 rounded-2xl font-black uppercase shadow-xl">Confirm Deposit</button>
        <button onclick="document.getElementById('pay-modal').classList.add('hidden')" class="mt-4 text-white/50 text-xs">Cancel</button>
    </div>

    <script>
        const dbURL = "https://ff-esport-bd-9dbc0-default-rtdb.firebaseio.com";
        const botToken = "7968384087:AAEpp_OvCgQRvKAe_wq9pnxozHY9UHq36GI";
        const adminId = "7071188264";

        let tg = window.Telegram.WebApp;
        tg.expand();
        const user = tg.initDataUnsafe.user || { first_name: "Gopal", id: "7071188264" };

        document.getElementById('u_name').innerText = user.first_name;

        // চেক স্ট্যাটাস
        function check() {
            if(user.id == adminId) {
                unlock();
                document.getElementById('owner_badge').classList.remove('hidden');
                return;
            }
            fetch(`${dbURL}/users/${user.id}.json`).then(res => res.json()).then(data => {
                if(data && data.isPaid) unlock();
            });
        }

        function unlock() {
            document.getElementById('lock').style.display = 'none';
            document.getElementById('predictor').classList.remove('opacity-30', 'pointer-events-none');
            document.getElementById('status_text').innerText = "PREMIUM ACTIVE";
            document.getElementById('status_text').className = "text-[10px] text-green-500 font-bold tracking-widest";
        }

        function showPlans() { document.getElementById('plan-modal').classList.remove('hidden'); }
        function openPay(plan, price) {
            window.activePlan = plan;
            document.getElementById('amt').innerText = "৳" + price;
            document.getElementById('pay-modal').classList.remove('hidden');
        }

        // একদম সরাসরি বটে মেসেজ পাঠানোর ফাংশন
        function sendToBot() {
            const trxId = document.getElementById('trx').value;
            if(trxId.length < 5) return alert("Invalid TrxID!");

            const message = `🚀 *NEW DEPOSIT REQUEST*\n\n👤 Name: ${user.first_name}\n🆔 UID: \`${user.id}\`\n💎 Plan: ${window.activePlan}\n💵 TrxID: \`${trxId}\`\n\n_Approve করার জন্য এডমিন প্যানেল ব্যবহার করুন_`;

            const url = `https://api.telegram.org/bot${botToken}/sendMessage`;
            const params = {
                chat_id: adminId,
                text: message,
                parse_mode: "Markdown"
            };

            fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(params)
            })
            .then(response => response.json())
            .then(res => {
                if(res.ok) {
                    alert("রিকোয়েস্ট পাঠানো হয়েছে! বট চেক করুন।");
                    document.getElementById('pay-modal').classList.add('hidden');
                    document.getElementById('plan-modal').classList.add('hidden');
                } else {
                    alert("ভুল হয়েছে: " + res.description);
                }
            })
            .catch(err => alert("Error: " + err));
        }

        function generate() {
            const res = Math.random() > 0.5 ? "BIG" : "SMALL";
            const box = document.getElementById('result');
            box.innerText = res;
            box.classList.remove('hidden');
            box.className = res === "BIG" ? "text-6xl font-black text-center mt-6 text-orange-500" : "text-6xl font-black text-center mt-6 text-blue-500";
        }

        check();
        setInterval(check, 5000);
    </script>
</body>
</html>
