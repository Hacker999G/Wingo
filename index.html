<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wingo Premium Predictor</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    
    <style>
        body { background: #050810; color: #e2e8f0; font-family: 'Poppins', sans-serif; }
        .glass-card { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(16px); border: 1px solid rgba(59, 130, 246, 0.2); border-radius: 28px; }
        .premium-btn { background: linear-gradient(90deg, #1e40af, #3b82f6); box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4); }
        .font-game { font-family: 'Orbitron', sans-serif; }
        .loader { border-top-color: #3b82f6; animation: spinner 1s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .hidden { display: none; }
    </style>
</head>
<body class="p-4 flex flex-col items-center min-h-screen">

    <div id="loading-screen" class="fixed inset-0 bg-[#050810] z-50 flex flex-col items-center justify-center">
        <div class="loader w-12 h-12 border-4 border-blue-900 rounded-full mb-4"></div>
        <p class="text-blue-400 animate-pulse text-sm">Verifying Access...</p>
    </div>

    <div class="w-full max-w-md flex items-center justify-between mb-6 glass-card p-4">
        <div class="flex items-center gap-3">
            <div id="u-icon" class="w-10 h-10 rounded-full bg-blue-600 flex items-center justify-center font-bold">?</div>
            <div>
                <p id="u-name" class="text-sm font-bold">User</p>
                <p id="u-status" class="text-[10px] text-red-400">Checking Status...</p>
            </div>
        </div>
        <div class="text-[10px] bg-slate-900 px-3 py-1 rounded border border-gray-800 uppercase">ID: <span id="u-id">0000</span></div>
    </div>

    <div id="lock-screen" class="hidden glass-card p-8 w-full max-w-md text-center">
        <div class="bg-blue-500/10 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
            <svg class="w-8 h-8 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <h2 class="text-xl font-bold mb-2">সাবস্ক্রিপশন প্রয়োজন</h2>
        <p class="text-xs text-gray-400 mb-6 px-2">সঠিক সিগন্যাল পেতে আপনার একাউন্টটি ১০০ টাকায় ৭ দিনের জন্য একটিভ করুন।</p>
        
        <div class="bg-black/40 p-4 rounded-2xl mb-6 border border-gray-800">
            <p class="text-2xl font-black font-game">৳১০০ <span class="text-xs font-normal text-gray-500">/ ৭ দিন</span></p>
        </div>

        <button onclick="handlePayment()" class="w-full py-4 rounded-2xl font-bold premium-btn text-white active:scale-95 transition-all">
            Pay Now via bKash/Nagad
        </button>
    </div>

    <div id="app-screen" class="hidden w-full max-w-md space-y-4">
        <div class="glass-card p-6">
            <select id="platform" class="w-full bg-slate-950 border border-gray-800 p-4 rounded-2xl mb-6 text-white outline-none">
                <option value="Dk win">Dk win</option>
                <option value="amar club">amar club</option>
                <option value="HAGZNIC">HAGZNIC</option>
            </select>

            <div class="grid grid-cols-2 gap-3 mb-6 font-game">
                <div class="bg-black/40 p-4 rounded-2xl text-center border border-gray-900">
                    <p class="text-[9px] text-gray-500 uppercase mb-1">Period</p>
                    <p id="period" class="text-blue-400 text-lg tracking-widest">---</p>
                </div>
                <div class="bg-black/40 p-4 rounded-2xl text-center border border-gray-900">
                    <p class="text-[9px] text-gray-500 uppercase mb-1">Timer</p>
                    <p id="timer" class="text-red-500 text-lg tracking-widest">00:30</p>
                </div>
            </div>

            <div id="res-box" class="hidden py-10 rounded-[2.5rem] bg-slate-950 border-2 border-blue-500/20 mb-6 text-center shadow-inner">
                <p class="text-[10px] text-gray-600 uppercase mb-2 tracking-[0.3em]">Next Signal</p>
                <h1 id="res-text" class="text-6xl font-black font-game italic">---</h1>
            </div>

            <button onclick="generateSignal()" id="gen-btn" class="w-full py-5 rounded-2xl font-black premium-btn uppercase tracking-widest text-sm shadow-xl active:scale-95 transition-all">
                Generate Signal
            </button>
        </div>
    </div>

    <script>
        // --- Firebase Configuration ---
        const firebaseConfig = {
            apiKey: "AIzaSyCktzbHCPM1upP5xJppjM_Jg5ZcFBGFAdo",
            authDomain: "ff-esport-bd-9dbc0.firebaseapp.com",
            projectId: "ff-esport-bd-9dbc0",
            storageBucket: "ff-esport-bd-9dbc0.firebasestorage.app",
            messagingSenderId: "31048615788",
            appId: "1:31048615788:web:2806b7b5c68181d9de5549",
            measurementId: "G-3NWYCF7WW9"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // --- Telegram & User Info ---
        const tg = window.Telegram.WebApp;
        tg.expand();
        const user = tg.initDataUnsafe?.user || { first_name: "Gopal", id: "6849201" };
        
        document.getElementById('u-name').innerText = user.first_name;
        document.getElementById('u-id').innerText = user.id;
        document.getElementById('u-icon').innerText = user.first_name[0];

        // --- Check User Status from Firebase ---
        async function checkAccess() {
            const userRef = db.collection('users').doc(user.id.toString());
            const doc = await userRef.get();

            if (doc.exists) {
                const data = doc.data();
                const now = new Date().getTime();
                
                if (data.expiryDate > now) {
                    showApp();
                } else {
                    showLock();
                }
            } else {
                showLock();
            }
            document.getElementById('loading-screen').classList.add('hidden');
        }

        function showApp() {
            document.getElementById('app-screen').classList.remove('hidden');
            document.getElementById('u-status').innerText = "Premium: Active";
            document.getElementById('u-status').className = "text-[10px] text-green-400";
        }

        function showLock() {
            document.getElementById('lock-screen').classList.remove('hidden');
            document.getElementById('u-status').innerText = "Premium: Inactive";
        }

        // --- Payment Logic ---
        function handlePayment() {
            const payUrl = `https://payflow-git.vercel.app/?pay=9zaIHrtpb3iiAGKsRZjg&amount=100&cus_id=${user.id}&opt_a=7days_wingo`;
            tg.openLink(payUrl);
            
            // অটো-ভেরিফিকেশন টেস্ট (ইউজারকে পেমেন্টের পর এই বাটন কাজ করাতে চাইলে)
            alert("পেমেন্ট সম্পন্ন করার পর ব্যাক অ্যাপটি রিফ্রেশ দিন।");
        }

        // --- Predictor Logic ---
        function updateTimer() {
            const now = new Date();
            const sec = now.getSeconds();
            const remain = 30 - (sec % 30);
            document.getElementById('timer').innerText = `00:${remain < 10 ? '0' : ''}${remain}`;
            
            const pNum = Math.floor((now.getHours() * 120) + (now.getMinutes() * 2) + (sec >= 30 ? 2 : 1));
            document.getElementById('period').innerText = "..." + pNum;

            if (remain === 30) {
                document.getElementById('res-box').classList.add('hidden');
                document.getElementById('gen-btn').disabled = false;
                document.getElementById('gen-btn').innerText = "Generate Signal";
            }
        }
        setInterval(updateTimer, 1000);

        function generateSignal() {
            const btn = document.getElementById('gen-btn');
            btn.disabled = true;
            btn.innerText = "Analyzing...";

            setTimeout(() => {
                const res = ["BIG", "SMALL"][Math.floor(Math.random() * 2)];
                document.getElementById('res-box').classList.remove('hidden');
                document.getElementById('res-text').innerText = res;
                document.getElementById('res-text').className = `text-6xl font-black font-game italic ${res === 'BIG' ? 'text-blue-500' : 'text-red-500'}`;
                btn.innerText = "Signal Ready";
            }, 1200);
        }

        // Start checking access
        checkAccess();
    </script>
</body>
</html>
